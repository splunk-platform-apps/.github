name: Verify Authorization to approve an issue

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  handle-issue:
    environment: create-repo-from-issue
    runs-on: ubuntu-latest
    # Only run if the 'approved' label was added
    if: github.event.label.name == 'approved'
    steps:
      - uses: actions/checkout@v7

      # Check if user is member of authorized team
      - uses: tspascoal/get-user-teams-membership@v4
        id: checkUserMember
        with:
          username: ${{ github.event.sender.login }}
          team: 'admins'
          GITHUB_TOKEN: ${{ secrets.APPROVAL_REPO_PAT }}

      - name: Verify authorization
        id: authz
        run: |
          if [ "${{ steps.checkUserMember.outputs.isTeamMember }}" != "true" ]; then
            echo "❌ User ${{ github.event.sender.login }} is not authorized to trigger this workflow"
            echo "Only members of the admins team can approve issues"
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "✅ User authorized to approve issue"
          echo "authorized=true" >> "$GITHUB_OUTPUT"

      # Next steps run only if authorization failed

      - name: Remove unauthorized label
        if: steps.authz.outputs.authorized == 'false'
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_KEY }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --remove-label "approved"

      - name: Comment on issue
        if: steps.authz.outputs.authorized == 'false'
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_KEY }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "⚠️ @${{ github.event.sender.login }} is not authorized to approve issues. The \`approved\` label has been removed. Only members of the admins team can approve."
